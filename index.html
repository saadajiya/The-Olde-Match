<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Archaic Match | Британские и американские архаизмы</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: linear-gradient(145deg, #f7f3e9 0%, #e8e0d5 100%);
            font-family: 'Segoe UI', 'Roboto', 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        /* Игровая карточка */
        .game-card {
            max-width: 700px;
            width: 100%;
            background: #fffef7;
            border-radius: 60px 60px 70px 70px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), inset 0 1px 3px rgba(255, 255, 255, 0.9);
            overflow: hidden;
            padding: 20px 28px 40px;
            transition: all 0.2s;
        }

        /* Шапка: переключатель регионов и счет */
        .mode-bar {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .mode-btn {
            font-size: 1.15rem;
            font-weight: bold;
            padding: 8px 28px;
            border: none;
            border-radius: 60px;
            background: #f0e2d0;
            color: #5a3e2b;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            box-shadow: 0 3px 0 #bc9a7a;
        }

        .mode-btn.active {
            background: #2c5f2d;
            color: white;
            box-shadow: 0 3px 0 #1d3e1e;
            transform: scale(0.98);
        }

        .score-board {
            background: #d9c9b4;
            border-radius: 50px;
            padding: 10px 20px;
            text-align: center;
            font-weight: bold;
            font-size: 1.5rem;
            color: #2d2b26;
            font-family: monospace;
            letter-spacing: 2px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 0 2px #fef3e2, 0 4px 10px rgba(0,0,0,0.05);
        }

        /* Архаизм крупно */
        .archaic-word {
            background: #fffbee;
            border-radius: 55px;
            padding: 30px 15px;
            text-align: center;
            font-size: 2.1rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: #3b2a1f;
            margin: 15px 0 30px;
            border: 2px solid #e0cdb2;
            box-shadow: inset 0 0 0 4px #fff6e8, 0 10px 15px -8px rgba(0,0,0,0.2);
            word-break: break-word;
        }

        /* Кнопки-варианты */
        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 30px;
        }

        .option-btn {
            background: #f3ebdd;
            border: 2px solid #cdb89a;
            border-radius: 100px;
            padding: 14px 10px;
            font-size: 1.05rem;
            font-weight: 500;
            color: #38271a;
            cursor: pointer;
            transition: 0.1s linear;
            text-align: center;
            font-family: inherit;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            word-break: break-word;
            line-height: 1.3;
        }

        .option-btn:hover:not(:disabled) {
            background: #e3d4c0;
            transform: scale(0.99);
        }

        .option-btn.correct-guess {
            background: #97c1a9;
            border-color: #2b5e2c;
            color: white;
            pointer-events: none;
        }

        .option-btn.wrong-guess {
            background: #d88c74;
            border-color: #a14026;
            color: white;
            text-decoration: line-through;
            pointer-events: none;
        }

        .option-btn:disabled {
            cursor: default;
            opacity: 0.8;
        }

        .next-area {
            display: flex;
            justify-content: center;
            margin-top: 5px;
        }

        .next-btn {
            background: #7f5539;
            border: none;
            border-radius: 60px;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            width: 80%;
            max-width: 260px;
            box-shadow: 0 5px 0 #46301f;
        }

        .next-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #46301f;
        }

        .result {
            text-align: center;
            margin-top: 20px;
            font-weight: bold;
            font-size: 1.2rem;
            background: #f3e1be;
            padding: 12px;
            border-radius: 60px;
            color: #3f2c18;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 30px;
            color: #987f64;
        }

        @media (max-width: 550px) {
            .game-card { padding: 20px 16px 30px; }
            .archaic-word { font-size: 1.7rem; padding: 20px 10px; }
            .option-btn { font-size: 0.9rem; padding: 12px 8px; }
        }
    </style>
</head>
<body>
<div class="game-card" id="gameRoot">
    <div class="mode-bar">
        <button class="mode-btn" data-mode="british">🇬🇧 British English</button>
        <button class="mode-btn" data-mode="american">🇺🇸 American English</button>
    </div>
    <div class="score-board">🎯 СЧЁТ: <span id="scoreDisplay">0</span> / <span id="totalCount">0</span></div>
    <div class="archaic-word" id="archaicWord">загрузка...</div>
    <div class="options" id="optionsContainer"></div>
    <div class="next-area">
        <button class="next-btn" id="nextBtn">➡ СЛЕДУЮЩЕЕ</button>
    </div>
    <div class="result" id="resultMessage"></div>
    <footer>🗝️ выбери верный современный перевод</footer>
</div>

<script>
    // --------------------------------------------------------------
    // ТВОИ СЛОВА (британские и американские архаизмы)
    // --------------------------------------------------------------
    const WORDS_DB = {
        british: [
            { archaic: "thou", modern: "ты" },
            { archaic: "ye", modern: "вы" },
            { archaic: "methinks", modern: "мне кажется" },
            { archaic: "wherefore", modern: "зачем, почему" },
            { archaic: "ere", modern: "до, прежде чем" },
            { archaic: "betide", modern: "случаться" },
            { archaic: "wight", modern: "существо, человек" },
            { archaic: "behold", modern: "смотри, узри" },
            { archaic: "forsooth", modern: "воистину" },
            { archaic: "aye", modern: "да" },
            { archaic: "nay", modern: "нет" },
            { archaic: "hence", modern: "отсюда" },
            { archaic: "thence", modern: "оттуда" },
            { archaic: "whence", modern: "откуда" },
            { archaic: "eke", modern: "также" },
            { archaic: "aught", modern: "что‑либо" },
            { archaic: "naught", modern: "ничто" },
            { archaic: "whilom", modern: "некогда" },
            { archaic: "verily", modern: "поистине" },
            { archaic: "fain", modern: "охотно" },
            { archaic: "lief", modern: "охотно" },
            { archaic: "lo", modern: "вот, смотри" },
            { archaic: "troth", modern: "верность" },
            { archaic: "gramercy", modern: "большое спасибо" },
            { archaic: "mistress", modern: "госпожа" },
            { archaic: "squire", modern: "сквайр" },
            { archaic: "varlet", modern: "слуга, плут" },
            { archaic: "churl", modern: "грубиян" }
        ],
        american: [
            { archaic: "hussy", modern: "женщина, жена" },
            { archaic: "furbelow", modern: "оборки на одежде" },
            { archaic: "gumption", modern: "смекалка, здравый смысл" },
            { archaic: "barker", modern: "зазывала на ярмарке" },
            { archaic: "poke", modern: "мешок, карман" },
            { archaic: "tote", modern: "носить, таскать" },
            { archaic: "catawampus", modern: "кривой, перекошенный" },
            { archaic: "slapdash", modern: "небрежно, наспех" },
            { archaic: "hornswoggle", modern: "обманывать" },
            { archaic: "discombobulate", modern: "сбивать с толку" },
            { archaic: "taradiddle", modern: "маленькая ложь" },
            { archaic: "kerfuffle", modern: "суматоха" },
            { archaic: "lollygag", modern: "бездельничать" },
            { archaic: "snollygoster", modern: "беспринципный хитрец" },
            { archaic: "cattywampus", modern: "перекошенный" },
            { archaic: "blatherskite", modern: "болтун" },
            { archaic: "gobbledygook", modern: "запутанная речь" },
            { archaic: "hullabaloo", modern: "шум, суматоха" },
            { archaic: "razzmatazz", modern: "показуха, шик" },
            { archaic: "skedaddle", modern: "убегать" },
            { archaic: "flummox", modern: "смущать, сбивать с толку" },
            { archaic: "abominable", modern: "отвратительный" },
            { archaic: "jabberwocky", modern: "бессмыслица" },
            { archaic: "whippersnapper", modern: "мальчишка, сопляк" },
            { archaic: "malarkey", modern: "ерунда" },
            { archaic: "poppycock", modern: "чепуха" },
            { archaic: "scallywag", modern: "негодяй" },
            { archaic: "nincompoop", modern: "глупец" },
            { archaic: "bamboozle", modern: "обманывать" },
            { archaic: "dillydally", modern: "медлить" },
            { archaic: "fiddle-faddle", modern: "пустяки" },
            { archaic: "hanky-panky", modern: "шалости" },
            { archaic: "hubbub", modern: "шум, гам" },
            { archaic: "knickknack", modern: "безделушка" },
            { archaic: "lickety-split", modern: "очень быстро" },
            { archaic: "ragamuffin", modern: "оборванец" },
            { archaic: "shilly-shally", modern: "колебаться" },
            { archaic: "topsy-turvy", modern: "вверх дном" },
            { archaic: "willy-nilly", modern: "волей‑неволей" },
            { archaic: "by jingo", modern: "восклицание удивления" },
            { archaic: "jim-dandy", modern: "отличный" },
            { archaic: "thingamajig", modern: "штуковина" },
            { archaic: "whatnot", modern: "всякая всячина" },
            { archaic: "yonder", modern: "вон там" },
            { archaic: "zounds", modern: "восклицание удивления" }
        ]
    };

    // ---------- Игровая логика ----------
    let currentMode = "british";       // 'british' или 'american'
    let currentWordsList = [];          // текущий массив объектов
    let currentIndex = 0;
    let score = 0;
    let answered = false;
    let currentQuestion = null;          // { archaic, modern }
    let currentOptions = [];              // массив строк-вариантов

    // DOM элементы
    const archaicWordSpan = document.getElementById("archaicWord");
    const optionsContainer = document.getElementById("optionsContainer");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const totalCountSpan = document.getElementById("totalCount");
    const nextBtn = document.getElementById("nextBtn");
    const resultMessageDiv = document.getElementById("resultMessage");

    // ---- Вспомогательные функции ----
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // Генерирует 4 варианта: один правильный + 3 случайных (уникальных)
    function generateOptions(correctModern, fullList, exceptArchaic) {
        let candidates = fullList.filter(item => item.modern !== correctModern && item.archaic !== exceptArchaic);
        candidates = candidates.map(item => item.modern);
        // убираем дубликаты среди переводов (если одинаковые)
        candidates = [...new Set(candidates)];
        // если вдруг не хватает, добавим заглушки
        while (candidates.length < 3) candidates.push("???", "неизвестно");
        const randomDistractors = shuffleArray([...candidates]).slice(0, 3);
        let opts = [correctModern, ...randomDistractors];
        return shuffleArray(opts);
    }

    function updateScoreUI() {
        scoreDisplay.innerText = score;
    }

    function setTotal() {
        totalCountSpan.innerText = currentWordsList.length;
    }

    // Загрузить текущий вопрос
    function loadQuestion() {
        if (currentIndex >= currentWordsList.length) {
            // Игра закончена
            archaicWordSpan.innerText = "✨ ИГРА ЗАВЕРШЕНА ✨";
            optionsContainer.innerHTML = "";
            resultMessageDiv.innerHTML = `🏆 Вы набрали ${score} из ${currentWordsList.length}! 🏆<br>Нажмите на диалект, чтобы сыграть снова.`;
            nextBtn.disabled = true;
            nextBtn.style.opacity = "0.5";
            return;
        }

        answered = false;
        currentQuestion = currentWordsList[currentIndex];
        archaicWordSpan.innerText = currentQuestion.archaic;
        
        // Генерируем варианты ответов
        currentOptions = generateOptions(currentQuestion.modern, currentWordsList, currentQuestion.archaic);
        
        // Отрисовка кнопок
        optionsContainer.innerHTML = "";
        currentOptions.forEach(opt => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.addEventListener("click", () => handleAnswer(btn, opt));
            optionsContainer.appendChild(btn);
        });
        
        // разблокируем next? пока false, next нажимается только после ответа.
        nextBtn.disabled = true;
        nextBtn.style.opacity = "0.5";
        resultMessageDiv.innerHTML = "🤔 Выбери вариант перевода...";
    }

    function handleAnswer(btn, selectedTranslation) {
        if (answered) return;
        answered = true;
        const isCorrect = (selectedTranslation === currentQuestion.modern);
        
        if (isCorrect) {
            score++;
            updateScoreUI();
            resultMessageDiv.innerHTML = "✅ ПРАВИЛЬНО! +1 очко ✅";
            btn.classList.add("correct-guess");
        } else {
            resultMessageDiv.innerHTML = `❌ ОШИБКА! Правильный ответ: "${currentQuestion.modern}" ❌`;
            btn.classList.add("wrong-guess");
            // Показать правильный вариант (подсветить)
            for (let child of optionsContainer.children) {
                if (child.innerText === currentQuestion.modern) {
                    child.classList.add("correct-guess");
                }
            }
        }
        
        // отключаем все кнопки после ответа
        for (let child of optionsContainer.children) {
            child.disabled = true;
        }
        
        nextBtn.disabled = false;
        nextBtn.style.opacity = "1";
    }

    function nextWord() {
        if (!answered && currentIndex < currentWordsList.length) {
            resultMessageDiv.innerHTML = "⚠️ Сначала ответь на вопрос! ⚠️";
            return;
        }
        if (currentIndex >= currentWordsList.length) return;
        currentIndex++;
        loadQuestion();
    }

    // Смена режима (британский/американский)
    function switchMode(mode) {
        currentMode = mode;
        currentWordsList = (mode === "british") ? [...WORDS_DB.british] : [...WORDS_DB.american];
        // перемешаем слова для интереса
        currentWordsList = shuffleArray(currentWordsList);
        currentIndex = 0;
        score = 0;
        answered = false;
        updateScoreUI();
        setTotal();
        loadQuestion();
        
        // Обновить активную кнопку
        document.querySelectorAll(".mode-btn").forEach(btn => {
            if (btn.getAttribute("data-mode") === mode) {
                btn.classList.add("active");
            } else {
                btn.classList.remove("active");
            }
        });
        resultMessageDiv.innerHTML = `🎮 Режим: ${mode === "british" ? "Британский" : "Американский"} английский. Удачи!`;
        nextBtn.disabled = false;
        nextBtn.style.opacity = "1";
    }

    // Инициализация и слушатели
    function init() {
        switchMode("british");
        
        // события на кнопки смены режима
        const modeBtns = document.querySelectorAll(".mode-btn");
        modeBtns.forEach(btn => {
            btn.addEventListener("click", (e) => {
                const mode = btn.getAttribute("data-mode");
                if (mode === "british" || mode === "american") {
                    switchMode(mode);
                }
            });
        });
        
        nextBtn.addEventListener("click", nextWord);
    }
    
    init();
</script>
</body>
</html>
